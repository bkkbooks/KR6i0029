body:
  text: 常不輕居士羅濬集菩聲尊者事眾尊者俱絺羅尊者火熖尊者善住尊者住道尊者大忍尊者餘慶尊者妙懼尊者嚴土尊者金髻尊者雷德尊者雷音尊者香彩尊者馬頭尊者明首尊者金首尊者教首尊者眾首尊者辨德尊者羼提尊者悟達尊者法燈尊者離垢尊者天王尊者無勝尊者月淨尊者不動尊者休息尊者調達尊者普光尊者智積尊者寶幢尊者善意尊者善服尊者寶勇尊者寶見尊者惠積尊者惠持尊者寶勝尊者道仙尊者帝網尊者明網尊者寶光尊者善調尊者奮迅尊者修道尊者大相尊者持世尊者光英尊者㩲教尊者善思尊者法眼尊者梵勝尊者光矅尊者直意尊者摩帝尊者惠寬尊者曇摩尊者歡𢝫尊者遊戲尊者道世尊者等明尊者普等尊者惠作尊者助勸尊者難勝尊者善德尊者歡𢝫尊者直意尊者梵勝尊者光矅尊者摩帝尊者道世尊者曇摩尊者惠寬尊者遊戲尊者寶涯尊者觀身尊者華王尊者德首尊者善見尊者善宿尊者愛光尊者花光尊者善根尊者德頂尊者妙臂尊者龍猛尊者弗沙尊者德光尊者散結尊者淨正尊者善觀尊者大力尊者電光尊者寶仗尊者善星尊者羅旬尊者慈地尊者慶友尊者世友尊者滿宿尊者闡陀尊者丈夫尊者淨藏尊者淨眼尊者羅密尊者昧聲尊者祥呪尊者断業尊者伽耶尊者善法尊者頓悟尊者鳩舍尊者大藥尊者月盖尊者𢝫見尊者自明尊者慈仁尊者賢首尊者最上尊者金剛尊者無比尊者師翻尊者信證尊者敬端尊者法通尊者所行尊者頂檀尊者調馬尊者愛波尊者大名尊者雲姓尊者舡師尊者邪秖尊者湏陀尊者燈指尊者僧護尊者滿茶尊者龍斍尊者羅社尊者法護尊者耶舍尊者善護尊者法勝尊者法餞尊者善陀尊者牛護尊者護命尊者能護尊者巨醯尊者𦒿哆尊者目哆尊者根護尊者𢝫慧尊者佉高尊者三相尊者七色尊者沙尊者福增尊者聽𦖟尊者龍護尊者尊那尊者光明尊者湏俱尊者勝支尊者遍照尊者天軍尊者法增尊者寶珠尊者栴檀尊者長爪尊者兀手尊者花手尊者尼提尊者法語尊者𡩷沙尊者邪殊尊者護國尊者護主尊者頭髻尊者妙髻尊者妙觀尊者意速尊者妙意尊者多意尊者離苦尊者尊勝尊者作業尊者業果尊者大稱尊者蓮華尊者三色尊者大意尊者尾囉尊者善肘尊者婆破尊者堅牢尊者尼婆尊者拘羅尊者婆陀尊者面王尊者般㝹尊者釋王尊者月光尊者果衣尊者輸提尊者善來尊者鬼地尊者盧遮尊者湏尊者𭛔足尊者無畏尊者奚尊者炎盛尊者鹿頭尊者湏拔尊者重姓尊者寶天尊者華天尊者金財尊者乞兒尊者私檀尊者妙顏尊者大化尊者光度尊者月明尊者分那尊者受彼尊者叔離尊者賢光尊者離尊者婆差尊者一心尊者斯尼尊者如尊者寶盖尊者三藏尊者迦渠尊者難陀尊者金色尊者妙聲尊者海生尊者尼婆尊者般他尊者香身尊者化生尊者佛提尊者滿足尊者象力尊者吉祥尊者童子尊者金天尊者鉢默尊者多寶尊者慧月尊者等覩尊者馬聲尊者象護尊者滿尊者那先尊者圓滿尊者白淨尊者望滿尊者無憂尊者献蜜尊者至遠尊者極遠尊者等活尊者儒童尊者眾賢尊者左取尊者指鬘尊者龍軍尊者迦丁尊者大箂尊者婆耶尊者等會尊者婆破尊者善勝尊者馬師尊者施羅尊者牛脚尊者長𢝫尊者上寶尊者善和尊者實力尊者大光尊者大遍尊者善斍尊者離越尊者浮尊者無滅尊者仙道尊者牛主尊者波利尊者帶毒尊者愚路尊者浮陀尊者大路尊者離謂尊者跋提尊者難陀尊者𠇍摩尊者婆羅尊者左受尊者私婆尊者瞿沙尊者婆已尊者法救尊者妙音尊者提婆尊者法叵尊者霧氣尊者斍天尊者佛護尊者上勝尊者杪兒尊者普友尊者覺意尊者德力尊者不舍尊者雨氏尊者海氏尊者慧積尊者開門尊者决意尊者雷吼尊者無𡧱尊者尊上尊者心念尊者知根尊者宿王尊者法力尊者忻樂尊者愛子尊者世愛尊者超施尊者是愍尊者樂道尊者鮮潔尊者維頭尊者吉善尊者尊施尊者導師尊者華氏尊者坁舍尊者上華尊者慧光尊者導眾尊者善樂尊者炎光尊者以時尊者剛丘尊者尊教尊者福力尊者智最尊者善辨尊者慧善尊者雨積尊者見敬尊者慧力尊者月行尊者散施尊者智力尊者供養尊者寂意尊者建立尊者奉行尊者尊法尊者流江尊者眼愛尊者智兵尊者良田尊者供味尊者堅刃尊者聞上尊者善賢尊者慧上尊者慧施尊者樂音尊者執光尊者明炎尊者勝施尊者度世尊者最英尊者福首尊者好顏尊者重王尊者法肅尊者福供尊者義氏尊者德稱尊者上華尊者雄施尊者導眾尊者龍力尊者囙法尊者雨音尊者梵音尊者多堅尊者寶藏尊者月愛尊者施華尊者極施尊者意恱尊者勝友尊者山積尊者愛上尊者正施尊者月天尊者施世尊者動光尊者寶受尊者識愛尊者樂慧尊者𢝫愛尊者月訓尊者首力尊者愛英尊者仁力尊者寶上尊者日藏尊者持地尊者供柔尊者月英尊者堅進尊者善安尊者吉利尊者福威尊者氶御尊者力天尊者蓮目尊者上金尊者月華尊者善盖尊者知愛尊者堅施尊者雪色尊者造義尊者四眼尊者月寂尊者嚮審尊者極音尊者寶供尊者壽命尊者尊友尊者施炎尊者日月尊者降根尊者寶捨尊者樂德尊者自在尊者天氏尊者滿明尊者月氏尊者強步尊者智光尊者護法尊者堅燈尊者祥幢尊者嚴好尊者石王尊者進施尊者重施尊者天愛尊者勝王尊者學氏尊者愍傷尊者豐贍尊者訓寂尊者進土尊者照上尊者𢝫兵尊者紫藏尊者勝兵尊者善多尊者雄天尊者寶施尊者樂嚮尊者寶域尊者法音尊者月施尊者甚調尊者欣𢝫尊者善應尊者閻最尊者炎味尊者閻吼尊者月首尊者慧殊尊者勇步尊者海意尊者愛施尊者貴施尊者勤凉尊者樂尊尊者石樂尊者大威尊者多福尊者樂施尊者樂成尊者樂目尊者法氏尊者大神尊者外示尊者海身尊者退施尊者施藥尊者愛音尊者青蓮尊者修成尊者尊燈尊者月上尊者大樂尊者日施尊者安上尊者威英尊者威神尊者勝力尊者施明尊者甚諦尊者華施尊者普施尊者捨嫉尊者無限尊者誠英尊者月藏尊者所生尊者力施尊者意錦尊者超步尊者有志尊者愛月尊者其法尊者力步尊者無喻尊者俱進尊者智威尊者郡氏尊者上首尊者愛經尊者密郡尊者炎樂尊者甚調尊者多豐尊者法住尊者寶威尊者與護尊者石氏尊者思兵尊者断施尊者樂諧尊者䢖致尊者意行尊者愛術尊者施耀尊者勇施尊者根意尊者斍嫉尊者水天尊者音心尊者法音尊者上與尊者藥解尊者法與尊者梵天尊者尊氏尊者智結尊者福慧尊者二財尊者功福尊者尊寶尊者仁賢尊者福愛尊者妙好尊者了想尊者具或尊者法稱尊者執鎧尊者上意尊者賢天尊者無懼尊者勇猛尊者調支尊者言支尊者養友尊者樹目尊者樂法尊者園觀尊者柔䎡尊者法事尊者尊支尊者藥氏尊者覺友尊者湏達尊者樂愛尊者柔音尊者勝支尊者月賢尊者師子尊者堅強尊者地尊尊者月耀尊者善施尊者尊燈尊者頗陛尊者那先尊者端正尊者海意尊者意樂尊者戍拏尊者等觀尊者近護尊者化齊王建八万四十塔天尊者寶手尊者手中會不隨捨隨有地尊者那尊者
