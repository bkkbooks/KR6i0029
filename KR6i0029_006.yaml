body:
  text: 常不輕居士羅濬集福德王菩如理慧菩普供慧菩一相慧菩勢力慧菩虛空慧菩那伽慧菩華齒王菩念莊嚴菩智慧芽菩勝法王菩無怨勝菩無悔厭菩性莊嚴菩達空際菩了佛種菩住佛智菩化德藏菩日光明菩如來藏菩扇多意菩光明覺菩喜信淨菩大海智菩廣大覺菩阿僧伽菩英吉祥菩根吉祥菩耎吉祥菩重勝王菩福德光菩金山王菩奮迅王菩師子相菩選遊步菩蓮華子菩如來林菩炎德藏菩智行足菩擇戰鬪菩善繫意菩毗婆訶菩勝行王菩大勢德菩憍曰兜菩因坻達菩幢吉祥菩念吉祥菩得成就菩實仙人菩虛空明菩世間利菩平等心菩不究竟菩天王光菩自在光菩緊迦羅菩消除王菩甘露光菩無性光菩天中天菩深意王菩變化界菩自性光菩無餘幢菩無髻王菩無邊華菩世間光菩寶檀華菩最勝子菩金剛吼菩殊致羅菩證真常菩一切勇菩祕密藏菩提波羅菩分別明菩龍王吼菩雷電吼菩大勤勇菩福德音菩堅牢慧菩安詳步菩吉祥幢菩質直行菩歡喜根菩出生王菩普遍花菩智吉祥菩出法藏菩離取捨菩法吉祥菩妙幢手菩妙金剛菩財吉祥菩勝天王菩違頭羅菩高炬王菩蓮華勝菩功德聚菩無吾我菩大空藏菩大悲心菩不置遠菩哀雅威菩金寶藏菩懷日藏菩勝華藏菩南無淨菩南無雨菩南無恆菩南無止菩南無上菩南無華菩南無山菩南無月菩南無空菩南無高菩南無白菩南無象菩龍明菩佛變菩思義菩行林菩勝林菩力林菩智林菩梵頂菩日幢菩持藏菩妙德菩佛意菩人意菩祠意菩達意菩月上菩非義菩寶女菩音守菩惠積菩威行菩一王菩具足菩無感菩普賢菩遍吉菩導師菩藥王菩天藏菩地藏菩智稱菩智勝菩多聲菩智作菩善數菩淨聲菩妙智菩大勝菩合聚菩名勝菩智力菩勇德菩德勝菩樂行菩寶行菩寶火菩法作菩勝慧菩智象菩日德菩寶面菩普至菩無憂菩奮迅菩妙勝菩妙意菩香象菩日光菩日藏菩寶炬菩雲王菩山王菩不退菩愛作菩精進菩無怨菩燈手菩寶手菩廣心菩禪食菩能勝菩天眼菩吉意菩持意菩天官菩妙生菩龍勝菩龍德菩地持菩寶掌菩愛見菩大山菩廣思菩常憶菩無垢菩堅意菩普行菩善勝菩寶作菩寶月菩思益菩月山菩智山菩樂作菩勝意菩智澤菩賢首菩見愛菩勝護菩無言菩寂意菩山峰菩普光菩海慧菩速行菩不瞬菩天山菩大將菩善臂菩深行菩善見菩寶路菩百光菩金山菩寶天菩海民菩寶輪菩難可菩大力菩淨心菩離垢菩大月菩捨罪菩金髻菩普眼菩美月菩寂行菩淨勝菩勝聚菩網明菩難匹菩星得菩善力菩增意菩大意菩持世菩住意菩持地菩寶臂菩深辨菩華手菩寶德菩過菩成利菩雲音菩轉菩演華菩寶華菩上德菩疾辨菩樂衆菩愛天菩樂佛菩寶嚴菩持熱菩德海菩普利菩無染菩善戒菩增上菩滅相菩常勝菩增法菩增友菩勝衆菩日寶菩樂勝菩上嚴菩勝怨菩一蓋菩寶畫菩勝數菩淨門菩智德菩等行菩重智菩寶光菩妙眼菩增勇菩持法菩寶象菩寶陳菩普守菩調御菩勇行菩香德菩法德菩明輪菩智衆菩益意菩普明菩自在菩得力菩德積菩安住菩持明菩名德菩鉤鎖菩法積菩行行菩得念菩巨山菩破疑菩安立菩進力菩火德菩堅力菩淨因菩帝王菩善意菩觀華菩隱密菩高生菩必成菩明燈菩無邊菩智親菩華王菩華身菩善擇菩法上菩香德菩大音菩火明菩無病菩妙宿菩善覺菩過行菩陰雲菩演香菩法生菩不動菩安王菩金蓋菩有德菩無驚菩智積菩照方菩德守菩富足菩選擇菩智高菩次德菩自燈菩帝得菩衆歸菩妙性菩轉胎菩聲德菩明音菩釋衆菩迦葉菩難提菩德眼菩慈心菩報恩菩作明菩火相菩無有菩智藥菩善來菩大明菩甚深菩華聚菩妙德菩滿𭛔菩圓覺菩財首菩普平菩梵子菩覺音菩善護菩月子菩善目菩智王菩慈氏菩密室菩賢護菩常笑菩直意菩喜王菩金色菩寂觀菩衆相菩消災菩息災菩難有菩雷音菩信近菩常勤菩善菜菩教示菩德手菩造行菩炎光菩辨聚菩喜手菩常觀菩持進菩大慧菩佛眼菩香主菩寶首菩施首菩善首菩梵德菩月音菩明幢菩寶眼菩月幢菩日眼菩齊藏菩寶覺菩明光菩海聲菩智涌菩靜光菩主聲菩戒梯菩生勝菩行登菩善目菩了生菩發意菩明天菩衆善菩補處菩星德菩光聚菩釋幢菩樂見菩聖光菩地意菩喜光菩德色菩月勝菩法首菩寶賢菩目首菩智首菩如相菩天鬚菩寶相菩月藏菩生疑菩無著菩大藥菩馬光菩淨意菩空無菩聖天菩法益菩天王菩龍勝菩速疾菩清辨菩天親菩安慧菩高德菩威儀菩雲蔭菩藥藏菩龍猛菩慧頂菩不離菩散脂菩法來菩天友菩德慧菩慧炬菩慧法菩寶日菩華德菩曠野菩普視菩大光菩普廣菩無言菩寶結菩持人菩寶車菩僧崖菩瞿汝菩光味菩𨴍首菩善多菩堅惠菩得忍菩不眴菩首立菩惠法菩海慧菩乘雲菩利賔菩稱土菩等觀菩妙臂菩妙實菩仁王菩日王菩無火菩無作菩目佉菩因光菩安樂菩計都菩日光菩能忍菩誐諦菩曩鼻菩大車菩成就菩難得菩逮住菩最上菩能降菩極高菩仙人菩無涼菩父師菩自明菩自息菩白幢菩太祖菩善了菩暗幢菩計菩閉光菩真實菩智欲菩智密菩妙財菩口猛菩大慈菩顰眉菩太白菩依法菩世上菩具足菩梵授菩妙矅菩普滿菩寶授菩常喜菩印拳菩義拳菩智拳菩覺林菩普華菩慧聚菩華嚴菩常慘菩龍授菩智上菩作愛菩普寤菩普意菩普念菩星光菩明照菩會藏菩智光菩梵初菩慧積菩喜德菩義意菩燈明菩喜授菩仁授菩帝授菩德王菩離憂菩常喜菩行慧菩月觀菩定藏菩寶信菩立菩意行菩周旋菩龍施菩面王菩施樂菩過步菩英首菩妙心菩吉行菩勝達菩智意菩甘首菩玄遠菩善發菩普戒菩善實菩圓光菩船藏菩梵光菩照光菩地聲菩法種菩寶信菩立菩意行菩周旋菩龍施菩面王菩施樂菩過步菩英首菩妙心菩吉行菩勝達菩智意菩甘首菩玄遠菩善發菩普戒菩善實菩圓光菩船藏菩梵光菩照光菩地聲菩法種菩福相菩衆上菩光明菩月勝菩羅睺菩法超菩法輪菩稱意菩電得菩寶賢菩成行菩人明菩光觀菩淨王菩正起菩超倫菩慧幢菩樂慧菩寶髻菩光莫菩意菩執御菩聞稱菩大御菩日矅菩月淨菩御衆菩受音菩無受菩執誦菩質遊菩首具菩德臻菩敬見菩轉女菩真陳菩清修菩勝響菩專行菩寶勇菩妙錦菩過行菩法識菩原㷿菩歡樂菩雨滴菩名意菩布演菩長壽菩顯德菩賢力菩辨聰菩識機菩帝天菩百千菩山嶽菩井宿菩智稱菩威神菩光勝菩悟意菩山密菩月鬘菩銀光菩華月菩等有菩定藏菩施藥菩快譬菩尊官菩見人菩月吉菩法志菩住定菩定意菩善問菩月照菩無進菩上善菩髮猛菩福田菩善慧菩應聲菩文娟吉祥菩代淨救世菩武事總持菩涓帝燉煌菩法護法師印手菩消安法師
