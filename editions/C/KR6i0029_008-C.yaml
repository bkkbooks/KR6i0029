body:
  text: 前住浦城大同禪院沙門紹南述明天下之事而昧於理者有之理事無礙窮未來際越天壤而同時未形有分之初辨所不能言一念徧周葉通三世昔如來唘大悲心四十九年一味醍醐平等法施聞道證果妙契無生居士肉熏等慈視人憂𢝫若己有之開奬善之門集聲聞尊者聖号警所未聞供養一湏陀洹經述不可量預流初果其功尚爾况聲聞應真功德如何哉道之晦明應時適變聖人之道亦寓之時謹俟來哲以廣清修謹序菩名經阿羅漢品第八常不輕居士羅濬集法華經云若有眾生內有智性從佛世尊聞法信受慇勤精進欲速出三界自求涅槃是名聲聞乘佛設權教引導眾生若無我佛慈悲不免羊車馳驟靈山法會記莂親永或以密行能澄七寶華佛或以多聞直至通王如來智慧過人妙趣華光善逝神足第一懋應旃擅世尊湏菩提之解空亦得雍容無相富樓那之說法猶能端拱法明以玉憍陳如之等流婆羅門之兄弟迦旃延之淪義學無學之聖人或曰光明或稱寶相或成正覺或作導師或以拈花破顏或為大善知識餘其妙利宏贊莫窮輙敘徽猷以貽來哲云爾紹興二十一年歲次辛未七月羅濬序菩名經阿羅漢品第八常不輕居士羅濬集南無毗婆尸佛六百二十万聲聞眾南無尸棄佛八十万聲聞比丘眾南無隨葉佛一十万聲聞比丘眾南無拘樓孫佛四万聲聞比丘眾南無拘那含佛三万聲聞比丘眾南無迦葉佛二万聲聞比丘眾南無釋迦佛一千二百五十聲聞眾勒佛龍華初會九十九億聲聞眾勒佛龍華二會九十六億聲聞眾勒佛龍華三會九十三億聲聞眾壽七万歲時無間佛土七百俱𦙆獨覺眾四瞿陀尼州第一賔度羅䟦囉惰闍尊者眷属一千阿羅漢等眾迦濕羅國第二迦諾迦伐蹉尊者眷属五百阿羅漢等眾東勝身州第三迦諾䟦釐惰闍尊属六百阿羅漢眾北俱盧州第四蘇頻陀尊者眷属七百阿羅漢等眾南贍部州第五詎羅尊者眷属八百阿羅漢等眾躭沒羅州第六䟦陀羅尊者眷属九百阿羅漢等眾僧伽茶州第七迦理迦尊者眷属一千阿羅漢等眾鉢頼拏州第八伐闍羅弗多羅尊者眷属一千一百阿羅漢香醉山中第九戍迦尊者眷属九百阿羅漢等眾三十三天第十半託迦尊者眷属一千三百阿羅等眾畢利颺瞿州第十一羅怙羅尊者眷属一千一百阿羅漢半度波山第十二那迦犀那尊者眷属一千二百阿羅漢廣脇山中第十三目揭陀尊者眷属一千三百阿羅漢可住山中第十四伐那婆斯尊者眷属一千四百阿羅漢眾鷲峯山中第十五阿氏多尊者眷属一千五百阿羅漢持軸山中第十六注茶半迦尊者眷属一千六百阿羅漢迦葉命阿難撰集三藏于時承命來會八万四千阿羅漢眾百子周產尊者昔長者婦生一肉摶問佛言七日當見有百男兒端正無比出家得阿羅漢名稱上座尊者年在母胎中既出胎已老故上座優鉢尸披羅尊者一兄弟二人𡖉所生證果毗多輸柯尊者阿育王弟為兄所化後證羅漢童子迦葉尊者八歲得道遂證阿羅漢果優波離尊者律經一藏悉皆此尊者所記雙福尊者生下證果雙德尊者兄弟雙生端正尊者十三證果終好尊者胎佛子菩提曼陀羅尊者弗沙婆陀羅尊者目連子帝湏尊者畢陵迦婆蹉尊者尾瑟女末底尊者鉢捺麼嚩底尊者陀羅婆摩羅尊者拘摩羅迦葉尊者優鉗摩居江尊者比利陀婆遮尊者摩呵迦延那尊者摩咥里制多尊者路摩尚秖迦尊者達磨恒邏多尊者復鉢尸披羅尊者頞鞞摩訶納尊者沓婆摩羅子尊者難提蜜多羅尊者種子湏提那尊者伽羅湏末那尊者聾摩奢恒𦒿尊者持律優波離尊者摩訶大迦葉尊者優樓頻螺迦葉尊者摩訶迦旃延尊者摩訶拘絺羅尊者難陀孫陀羅尊者難陀富樓那尊者阿若憍陳如尊者多羅尼子尊者陀驃迦盧尊者波頭洗羅尊者陀婆波羅尊者䟦提梨迦尊者憍梵波提尊者僧伽提婆尊者樹提陀婆尊者呵利難陀尊者尸陀槃居尊者窣吐羅那尊者耶殊陀羅尊者旃陀跂闍尊者那羅達多尊者摩拏囉他尊者惹野嚩底尊者蘇嚩多尊者鉢囉嚩囉尊者法擔沒羅尊者尾瑟女羅尊者莎擔沒羅尊者軍頭婆嘆尊者狐疑離日尊者婆提婆羅尊者周利般㝹尊者𦒿利摩難尊者滿彭盛明尊者為人所敬尊者阿濕波誓尊者跂提釋王尊者摩那荅陀尊者耶奢蜜多尊者罽賔寧王尊者達摩蜜多尊者迦那提婆尊者僧伽筏蘇尊者鄔波世羅尊者室利毱多尊者商諾迦衣尊者笈房鉢底尊者阿奴律陀尊者婆末羅子尊者俱瑟耻羅尊者二十億耳尊者小陀羅婆尊者婆那婆蹉尊者跂陀婆梨尊者優波扇多尊者羅吒婆羅尊者曩昔闡頑尊者婆跋羅茶尊者瞿沙披摩尊者𦒿尸披羅尊者優波斯那尊者塞建地羅尊者君頭波嘆尊者伽耶迦葉尊者那提迦葉尊者大目揵連尊者修迦妬路尊者僧伽摩寺尊者欝楞伽聖尊者頡離伐底尊者迦多演那尊者曇摩波羅尊者僧伽蜜多尊者婆難陀尊者鄔波摩那尊者帝湏達多尊者阿毗達磨尊者迦旃延子尊者奢摩達多尊者提婆沒摩尊者瞿沙跋摩尊者佛陀羅測尊者浮陀提婆尊者周羅般陀尊者優波帝湏尊者曇無波離尊者多達子尊者僧伽婆秀尊者末多婆那尊者阿㝹樓䭾尊者眾寶莊嚴尊者天湏菩提尊者優鉢羅色尊者阿仡羅迦尊者你哩尾拏尊者鳩摩邏多尊者阿由波羅尊者尸陀槃尼尊者鄔波摩那尊者帝湏達多尊者阿毗達磨尊者迦旃延子尊者奢摩達多尊者提婆沒摩尊者瞿沙跋摩尊者佛陀羅測尊者浮陀提婆尊者周羅般陀尊者優波帝湏尊者曇無波離尊者多達子尊者僧伽婆秀尊者末多婆耶尊者阿㝹樓䭾尊者眾寶莊嚴尊者天湏菩提尊者優鉢羅色尊者阿仡羅迦尊者你哩尾拏尊者鳩摩邏多尊者阿由波羅尊者尸陀槃尼尊者上思夷花尊者施興忻樂尊者大根名聞尊者多聞阿難尊者阿泥樓豆尊者有賢無垢尊者湏鈸陀羅尊者迦留陀夷尊者聞聲得果尊者旃檀藏王尊者施幢無垢尊者囙陀德惠尊者婆蘇槃豆尊者法界四樂尊者曼樓頻螺尊者佛陀密多尊者那延羅目尊者佛陀難提尊者末田底迦尊者難陀多化尊者優波毱多尊者教說常住尊者商那和修尊者達麼波羅尊者伽耶天眼尊者定果得業尊者莊嚴無憂尊者憶持囙緣尊者破邪神通尊者堅持三藏尊者毒龍歸依尊者同聲稽首尊者毗羅𦙁子尊者闍提首那尊者悲密世間尊者献花提記尊者眼光定力尊者伽耶舍那尊者莎底苾蒭尊者陂闍提婆尊者解空無垢尊者伏陀密多尊者富那耶舍尊者不著世間尊者解空第一尊者羅度無盡尊者金剛破魔尊者護世間尊者無憂禪定尊者無作惠善尊者千刼惠善尊者旃檀德香尊者金仙斍意尊者摩訶剎利尊者一念解空尊者無量本行尊者無業宿盡尊者觀身無常尊者千刼悲尊者瞿匹那含尊者解空定空尊者成就囙緣尊者堅通精進尊者陀波崙尊者𠃵陀訶利尊者解空自在尊者摩訶那提尊者見人飛騰尊者不空不有尊者周利槃特尊者瞿沙比丘尊者師子比丘尊者修行不著尊者摩利不動尊者三昧甘露尊者解空無名尊者七佛難提尊者金剛精進尊者方便法藏尊者觀行月輪尊者阿那衍那尊者拂塵三昧尊者辟支轉智尊者山頂龍泉尊者羅網思惟尊者刼賔覆藏尊者神通億耳尊者具壽但提尊者法王菩提尊者法藏永刼尊者無邊自在尊者菩聲尊者但那含尊者波羅密尊者鉢多羅尊者無邊聲尊者舍利弗尊者婆沙波尊者阿闍覩尊者均鄰儒尊者舍舍覩尊者達貳伽尊者阿毗𦒿尊者欝多羅尊者拔佉梨尊者修密多尊者摩求哆尊者𦒿婆伽尊者摩訶那尊者提那伽尊者弗提羅尊者叵舍羅尊者悉伽婆尊者釋迦稱尊者檀離尊者陀寫俱尊者賢刼首尊者金剛味尊者一乘味尊者婆私吒尊者心平等尊者不可比尊者樂覆藏尊者頗羅墮尊者断煩惱尊者簿俱羅尊者利婆多尊者護妙法尊者最勝意尊者湏燈尊者特伽羅尊者沙塞尊者善圓滿尊者智慧燈尊者波頭摩尊者旃檀藏尊者迦難留尊者香熖幢尊者阿濕卑尊者摩𡰱尊尊者福德首尊者利婆尊者舍遮獨尊者𠃵陀羅尊者威儀多尊者陀頭僧尊者議洗腸尊者德淨悟尊者無垢藏尊者降伏魔尊者阿僧伽尊者金富樂尊者周陀婆尊者住世間尊者燈遵首尊者甘露法尊者自在王尊者超法雨尊者湏達那尊者德妙法尊者士應真尊者堅固心尊者聲響應尊者應赴供尊者光明燈尊者塵刼空尊者功德相尊者執寶炬尊者忍生心尊者阿氏多尊者白香象尊者識自生尊者讚歎尊者定拂羅尊者聲別眾尊者離淨語尊者羅餘習尊者福業除尊者勝解空尊者修無德尊者𢝫無著尊者善無着尊者栴檀羅尊者心定論尊者奄羅滿尊者和檀尊者頂生光尊者直福德尊者湏那利尊者提婆長尊者韋藍王尊者成大利尊者法首尊尊者蘇頻陀尊者眾德首尊者金剛藏尊者瞿伽梨尊者日照明尊者除疑網尊者無量光尊者除眾憂尊者無垢德尊者光明網尊者修善行尊者坐清凉尊者無憂眼尊者法盖障尊者和倫調尊者淨除垢尊者𠫤諸業尊者無盡慈尊者䬃陀怒尊者那羅達尊者行持尊者天明尊尊者無盡智尊者編具足尊者寶盖尊尊者神通化尊者思善識尊者𢝫信靜尊者摩訶南尊者無量光尊者金剛惠尊者幻化空尊者金剛明尊者蓮華淨尊者拘那意尊者利亘羅尊者調定藏尊者無垢稱尊者天音聲尊者自在主尊者大威光尊者明世界尊者蠲慢意尊者超絕倫尊者持世界尊者定華至尊者無邊身尊者普㽵嚴尊者散勝幢尊者棄忠法尊者無㝵行尊者無盡慈尊者常悲愍尊者大塵障尊者光明熖尊者知眼明尊者堅固行尊者澍雲雨尊者不動羅尊者普光明尊者心觀淨尊者那羅德尊者師子尊尊者法上尊尊者精進辨尊者樂說果尊者觀無邊尊者無憂德尊者行無邊尊者惠金剛尊者義成就尊者善住義尊者德普洽尊者師子作尊者行忍慈尊者無相空尊者勇精進尊者勝清淨尊者有自空尊者淨那羅尊者法自在尊者師子頰尊者大賢光尊者訶摩羅尊者普調慜尊者師子臆尊者壞魔軍尊者分別身尊者淨解脫尊者質直行尊者智行慈尊者大熾妙尊者刧賔那尊者普熖光尊者高遠行尊者具足儀尊者如意新尊者得佛智尊者寂靜行尊者悟真常尊者破冤賊尊者滅𢙣趣尊者性海通尊者敏不息尊者攝眾心尊者導大眾尊者甞隱行尊者菩慈尊者眾苦尊者尋聲應尊者𢿘刼定尊者注法水尊者得定通尊者惠廣增尊者六根盡尊者拔庶羅尊者思埵尊者法茶迦尊者鉢利羅尊者莎伽陀尊者湏望尊者提善法尊者提多迦尊者水潮聲尊者智慧海尊者眾具德尊者不思議尊者遮仙尊者𡰱䭾伽尊者首正念尊者淨菩提尊者梵音天尊者囙地果尊者斍性解尊者精進山尊者修善業尊者無量光尊者不動意尊者阿逸多尊者孫陀羅尊者聖峰慧尊者曼殊行尊者阿利多尊者法輪山尊者眾和合尊者法無住尊者天皷聲尊者如意輪尊者首光熖尊者無比校尊者多伽羅尊者利婆多尊者普賢行尊者持三昧尊者威德聲尊者金毛師尊者名無盡尊者阿那悉尊者普勝山尊者辨才王尊者行化國尊者聲龍種尊者誓南山尊者富伽耶尊者行傳法尊者香金手尊者摩挐羅尊者光善現尊者惠依正尊者降魔軍尊者首熖光尊者持太醫尊者藏律行尊者德自在尊者龍王尊者闍夜多尊者泰摩利尊者義法勝尊者施婆羅尊者闡提歷尊者無垢尊尊者可波羅尊者聲皈依尊者禪定果尊者不退轉尊者達麼直尊者持善法尊者受勝果尊者心勝修尊者法會藏尊者常歡𢝫尊者
