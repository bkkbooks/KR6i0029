body:
  text: 常不輕居士羅濬集寶積菩天光菩藥上菩法光菩無比菩勝涌菩智香菩水智菩無畏菩地慧菩寶堅菩光德菩妙聲菩修成菩普香菩不樂菩善行菩不諦菩寶藏菩無名菩大法菩明首菩善住菩敬首菩大德菩慧首菩散華菩尊重菩師子菩金華菩月輪菩鸚鵡菩月光菩根土菩法王菩無性菩大悲菩世親菩安隱菩勇眾菩善德菩海智菩見菩信淨菩離言菩聞月菩雨音菩依義菩除慢菩陳那菩破魔菩善吉菩勝藏菩疑心菩海天菩大龍菩孩童菩大相菩寶勝菩慧威菩淨意菩離愛菩實語菩孔雀菩廣德菩惟逮菩光山菩大勇菩普華菩毗樓菩持色菩安惠菩勝山菩無住菩善眼菩善思菩普現菩智淨菩常觀菩善宿菩寶心菩長生菩勝菩慧聚菩深聲菩幢幡菩寶來菩無觸菩寶杖菩末底菩天吉菩你嚩菩普見菩世間菩善意菩遠行菩得大菩隱身菩合山菩淨天菩離暗菩深𢝫菩發教菩遠離菩勝眼菩伊菩水天菩深光菩過力菩童子菩儒首菩大現菩利辨菩大天菩離憂菩大意菩華耳菩智鈎菩珠瓔菩回猛菩轉華菩勤首菩普菩妙住菩珠髻菩賢愛菩善眾菩尊那菩執炬菩日前菩上眾菩內行菩應持菩白衣菩普德菩電鬘菩壞魔菩妙嚴菩𢝫見菩無動菩壞怨菩普信菩寂滅菩普步菩轉法菩普照菩宿王菩寶達菩梵上菩嚴王菩得念菩速辨菩星宿菩勝授菩實德菩伸授菩寶滿菩法涌菩法天菩日德菩帝德菩日觀菩利世菩廣聞菩樹王菩摩帝菩辨積菩勝志菩屈伸菩一行菩極進菩淨行菩不染菩德頂菩天進菩海德菩上意菩寶地菩多羅菩事意菩斍首菩幻意菩令首菩長意菩童男菩美光菩高幢菩剛通菩妙肩菩日盛菩列宿菩施勝菩智手菩離慼菩寶明菩普音菩寶樂菩一塵菩樂善菩觀月菩上行菩德惠菩寶火菩善授菩安立菩應持菩世德菩福光菩現諦菩明斍菩梵意菩慧菩智慧菩月王菩月德菩金光菩大聲菩思心菩尸棄菩善𢿘菩炎熾菩樓菩生德菩上菩弗妙菩徤辨菩皷音菩火熖菩思行菩電音菩頂德菩𢝫樂菩禪食菩首咸菩提舍菩城樂菩耶舍菩儒童菩大海菩篤進菩上音菩術詳菩雜頂菩千相菩愛趣菩首藏菩慧宗菩賢儒菩方聞菩愛𢝫菩常憂菩天讚菩地智菩歡曜菩方等菩習苦菩慈眾菩寶王菩稱眾菩豪賢菩憙月菩閑淨菩辨音菩實計菩雲光菩力盛菩德首菩慧聲菩上首菩極微菩善生菩吉善菩退怨菩潘象菩頂王菩銀幢菩護明菩辟摩菩普光菩善御菩遍光菩端嚴菩賢光菩行志菩漫陀羅婆沓菩師子奮迅行菩大集經云若為人天調伏眾生是不為難若為畜調伏眾生且之乃為難東方海中瑠璃山種種色窟毒蛇菩無死窟馬菩善住窟羊菩南方海中玻𭹳山上色窟獼猴菩誓窟鷄菩法床窟大菩西方海中菩提月山金剛窟猪菩香功德窟鼠菩高功德窟牛菩北方海中功德相高山明星窟師子菩淨道窟兔菩𢝫樂窟龍菩如是十二獸晝夜常行閻浮提內人天恭敬功德成就已於諸佛發深重一日一夜常令一獸遊行教化餘十一獸安住修行終而復始南無十方一切諸佛真如正法眼藏南無十方一切諸佛所說諸大法藏南無拘留孫如來天龍宮法藏南無拘那含佛天龍宮一切法藏南無迦葉佛國天龍宮一切法藏南無釋迦如來天龍宮一切法藏南無西印度黑蜂山寺一切法藏南無沮渠國大乘十二部法藏南無北印度石壁八字捨身法藏南無四大州界神州大國一切法藏南無易州石徑朔州恒安石窟經像南無西方二十八祖聖宋六祖禪師南無一切律師譯經法師受持三藏眾南無釋迦如來螺髮二十六萬寶塔南無釋迦如來舍利八萬四千寶塔南無釋迦如來六十四髭寶塔菩名經大菩品卷第七菩名經辟支佛品卷第七前住建州浦城大同禪院沙門紹南述道無今古學者勞形末之乎道理極情謂窮之益遠法輪三轉示導人天緣覺覺此聲聞聞此辟支妙果卓乎獨存無師之智自明通變並測究竟涅槃具諸聖解脫之場四生類聚無始漩澓與道背馳常不輕居士潛心內典深達法源集辟支聖号舉一例諸與佛名經同也鏤板施行流通末世法雨所滋道芽增秀福基妙利同殖聖因翻譯已來輔教者多矣未及於此抑有所待也謹序再序常不輕居士羅濬集法華經云若有眾生從佛世尊聞法信受慇勤精進求自然慧樂獨善寂深知諸法因緣是名辟支佛乘所謂辟支佛者自調身口意匪陟利他心入理水之淺深譬白馬之浮渡出火宅之焚燄駕麀鹿之卑車我佛定父子而全付家拂㩲跡而頓開寶藏一相一味之雨觸其類而敷榮中根中葉之微隨其冝而受潤直使盡虛空界不復聲聞無邊眾生悉成菩也謹序菩名經辟支佛品卷第七常不輕居士羅濬集無憂波遮羅辟支佛十二婆羅墮辟支佛十同名婆羅辟支佛持襯那祇梨辟支佛那伽羅尸棄辟支佛多伽羅尸棄辟支佛婆私瑟吒辟支佛雷電光明辟支佛帝奢念觀辟支佛阿耨婆達辟支佛無憂波耳辟支佛菩娑他淨辟支佛心得解脫辟支佛能作憍慢辟支佛憂波吉沙辟支佛修行不著辟支佛見人飛騰辟支佛無毒淨心辟支佛婆藪陀羅辟支佛阿梨審諦童辟支佛多子長者辟支佛度生死海辟支佛波羅奈王辟支佛毗流帝梨辟支佛阿耨菩提辟支佛播哩濕嚩辟支佛栴檀香辟支佛婆呬吒辟支佛塢波你辟支佛多伽囉辟支佛毗流帝辟支佛樂無為辟支佛阿利多辟支佛梨沙婆辟支佛毗耶離辟支佛俱羅辟支佛𠃵陀羅辟支佛婆利多辟支佛可波羅辟支佛秦摩利辟支佛修陀羅辟支佛摩訶男辟支佛施婆羅辟支佛憂波支辟支佛善住辟支佛劬多辟支佛差摩辟支佛留闍辟支佛賢德辟支佛牛齒辟支佛和里辟支佛金香辟支佛湏摩辟支佛漏盡辟支佛𢝫根辟支佛愛學辟支佛善賢辟支佛輸那辟支佛弗沙辟支佛無患辟支佛希尚辟支佛受學辟支