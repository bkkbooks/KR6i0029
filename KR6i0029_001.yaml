body:
  text: 前住建州大同禪院傳法沙門紹南述教流東夏大法熾然貝葉既興鴻臚秘典迺行天下三乘之理方便辤也頓漸有殊位次差別浩劫聖功不可得而思議彥章居士閱藏教五周經律論粵旨未始有異嘗謂如來為一大事因緣示現欲使眾生悟佛知見無一眾生不成佛者菩翅從先佛法會諸經互載未深內典莫究淵源緫集洪名煥然心目流通寶藏沛澤人天末眾生得聞授持啟迪難遭之想謹序再序常不輕居士羅濬集迦維羅國域天下之至中淨飯大王馭金輪之至貴意憙後裔甘蔗靈苗統攝萬方彌綸四海乘六之白象降神母之右胎鬼宿合時波羅誕貴圓明妙相三十二以莊嚴端正粹容八十種而具足於是覺一性之夢幻資戒定以董修游四門而後觀慮生死之難免遂迺踰春城於午夜駕𠃵陟而出王門褅觀何邏之悉檀無以趣其真又覩摩羅之非想罔以臻其妙坐断毗盧聖凢路絕六年行篇七覺華開直澄三菩提圓融一切智尼連何岸牛女献麋鹿野苑中吉祥奉草坐金剛王之寶座威振大千開甘露味之法門聲聞沙界功成名遂福報兩全痛雙樹之間薪窮火滅偉笑涅槃之妙返本還源文殊普賢法法海於中華龍樹馬鳴闡宗風於印度又況護明菩能為釋迦文佛彌勒開士當證慈氏如來矧茲補處動猷敢忘敷演恭惟十地神德豈不贊襄煥乎有文山岳不能比其固編而成集日月無以並其明濬也敢以㳙滴之微資陪於溟渤者宍庶幾與我同志者共為瞻仰焉謹序勝鬘夫人請佛文出大藏寶積經信禮常住三寶我聞如來聲世間頗難遇斯言若真實當賜汝衣服若彼佛世尊為利世間現必應見哀愍令我覩真相言念湏頃佛放虛空中現不思議身普放大光明勝鬘及眷属皆悉來集會合掌瞻仰禮稱嘆大導師如來妙色身世間無與等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住是故我皈依善調心過𢙣及與身四種到不思議地是故今謹禮知諸法𠇍炎智身無𦊱礙於法無忘失故我今謹禮稽首過稱量稽首無等倫稽首法自在稽首超思惟哀愍覆護我及法種增長逮及最後身當在如來前我所有福業今世及餘生由斯善根力佛當攝受菩名經諸佛品第一南無毗婆尸佛南無式棄佛南無拘留孫佛南無拘那含佛南無迦葉佛南無釋迦牟尼佛南無一萬一千九十三佛南無五千五百佛南無過去三十五佛南無過去五十三佛南無二萬億威音王佛南無二千億燈明佛南無二千億雲自在燈王佛南無五百華首百億金剛藏佛南無十二光佛南無七寶如來南無過現未來三世一切諸佛南無東方阿閦如來一切諸佛南無東南方無優德如來一切諸佛南無南方旃檀德如來一切諸佛南無西南方寶施如來一切諸佛南無西方無量明如來一切諸佛南無西北方華德如來一切諸佛南無北方相德如來一切諸佛南無東北方三乘行如來一切諸佛南無上方廣眾德如來一切諸佛南無下方明德如來一切諸佛南無極樂世界恒河沙數四十八大慈大悲無齊限𢿘同名阿彌陀佛南無上香刼一切諸佛諸大菩眾南無光味刼一切諸佛諸大菩眾南無無垢刼一切諸佛諸菩眾南無莊嚴刼一千諸佛諸菩眾南無星宿刼一千諸佛諸菩眾南無賢刼一千諸佛諸大菩眾南無妙智刼一切諸佛諸菩眾南無淨持刼一切諸佛諸菩眾南無妙音聲刼一切諸佛菩眾南無應往刼一切諸佛諸菩眾南無愛見刼一切諸佛諸菩眾南無寶開敷刼一切諸佛菩眾南無無住刼一切諸佛諸大菩眾南無清淨意刼一切諸佛諸菩眾南無光耀刼一切諸佛諸菩眾南無𢝫樂刼一切諸佛諸菩眾南無能度刼一切諸佛諸菩眾南無具足刼一切諸佛諸菩眾南無照明刼一切諸佛諸菩眾南無阿摩勒刼一切諸佛菩眾南無上香刼一切諸佛諸菩眾南無善斍刼一切諸佛菩眾南無寶莊嚴刼一切諸佛菩眾南無有寶刼一切諸佛諸菩眾南無憙滿刼一切諸佛諸菩眾南無大相刼一切諸佛諸菩眾南無寶明刼一切諸佛諸菩眾南無妙音滿刼一切諸佛菩眾南無離衰刼一切諸佛諸菩眾南無大光刼一切諸佛諸菩眾南無淨除刼一切諸佛諸菩眾南無陀羅𡰱刼一切諸佛菩眾南無難勝光王刼諸佛菩眾南無波羅林刼一切諸佛菩眾南無淨樂刼一切諸佛諸菩眾南無梵歎刼一切諸佛諸菩眾南無欣樂刼一切諸佛諸菩眾南無大演刼一切諸佛諸菩眾南無善見刼一切諸佛諸菩眾南無名聞刼一切諸佛諸菩眾南無善化刼一切諸佛諸菩眾南無樓油刼一切諸佛諸菩眾南無觀明刼一切諸佛諸菩眾南無威剌刼一切諸佛諸菩眾南無樂生刼一切諸佛諸菩眾南無寶成刼一切諸佛諸菩眾南無無塵刼一切諸佛諸菩眾南無禮禪刼一切諸佛諸菩眾南無𢝫觀刼一切諸佛諸菩眾南無勇猛刼一切諸佛諸菩眾南無寶明刼一切諸佛諸菩眾南無無咎刼一切諸佛諸菩眾南無勝滿刼一切諸佛諸菩眾南無正安隱刼一切諸佛菩眾南無照明刼一切諸佛諸菩眾南無首華刼一切諸佛諸菩眾南無大欣刼一切諸佛諸菩眾南無明察刼一切諸佛諸菩眾南無清淨刼一切諸佛大菩眾南無光明刼一切諸佛大菩眾南無大名稱刼一切諸佛菩眾南無淨光刼一切諸佛大菩眾南無賢天刼一切諸佛大菩眾南無電光明刼一切諸佛菩眾南無善决定刼一切諸佛菩眾南無善住刼一切諸佛大菩眾南無不可嫌刼一切諸佛大菩眾南無不可訶刼一切諸佛大菩眾南無華作刼一切諸佛大菩眾南無多盧刼一切諸佛大菩眾南無勝聲刼一切諸佛大菩眾南無成就善刼一切諸佛菩眾南無妙蓮華刼一切諸佛菩眾南無善眼刼一切諸佛大菩眾南無婆羅刼一切諸佛大菩眾南無梵讚嘆刼一切諸佛菩眾南無散華刼一切諸佛諸大菩眾南無華積刼一切諸佛諸大菩眾南無星喻刼一切