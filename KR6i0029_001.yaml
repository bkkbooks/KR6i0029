body:
  text: 前住建州大同禪院傳法沙門紹南述教流東夏大法熾然貝葉既興鴻臚祕典乃行天下三乘之理方便辭也頓漸有殊位次差別浩劫聖功不可得而思議彥章居士閲藏教五周經律論粵旨未始有異嘗謂如來為一大事因緣示現欲使衆生悟佛知見無一衆生不成佛者菩翅從先佛法會諸經互載未深內典莫究淵源總集洪名煥然心目流通寶藏沛澤人天末衆生得聞授持啓迪難遭之想謹序再序常不輕居士羅濬集迦維羅國域天下之至中淨飯大王馭金輪之至貴意喜後裔甘蔗靈苗統攝萬方彌綸四海乘六之白象降神母之右胎鬼宿合時波羅誕貴圓明妙相三十二以莊嚴端正粹容八十種而具足於是覺一性之夢幻資戒定以董修游四門而後觀慮生死之難免遂乃踰春城於午夜駕𠃵陟而出王門褅觀何邏之悉檀無以趣其真又覩摩羅之非想罔以臻其妙坐斷毗盧聖凡路絶六年行篇七覺華開直澄三菩提圓融一切智尼連何岸牛女獻麋鹿野苑中吉祥奉草坐金剛王之寶座威振大千開甘露味之法門聲聞沙界功成名遂福報兩全痛雙樹之間薪窮火滅偉笑涅槃之妙返本還源文殊普賢法法海於中華龍樹馬鳴闡宗風於印度又況護明菩能為釋迦文佛彌勒開士當證慈氏如來矧茲補處動猷敢忘敷演恭惟十地神德豈不贊襄煥乎有文山嶽不能比其固編而成集日月無以並其明濬也敢以㳙滴之微資陪於溟渤者宍庶幾與我同志者共為瞻仰焉謹序勝鬘夫人請佛文出大藏寶積經信禮常住三寶我聞如來聲世間頗難遇斯言若真實當賜汝衣服若彼佛世尊為利世間現必應見哀愍令我覩真相言念須頃佛放虛空中現不思議身普放大光明勝鬘及眷屬皆悉來集會合掌瞻仰禮稱嘆大導師如來妙色身世間無與等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住是故我皈依善調心過𢙣及與身四種到不思議地是故今謹禮知諸法𠇍炎智身無𦊱礙於法無忘失故我今謹禮稽首過稱量稽首無等倫稽首法自在稽首超思惟哀愍覆護我及法種增長逮及最後身當在如來前我所有福業今世及餘生由斯善根力佛當攝受菩名經諸佛品第一南無毗婆尸佛南無式棄佛南無拘留孫佛南無拘那含佛南無迦葉佛南無釋迦牟尼佛南無一萬一千九十三佛南無五千五百佛南無過去三十五佛南無過去五十三佛南無二萬億威音王佛南無二千億燈明佛南無二千億雲自在燈王佛南無五百華首百億金剛藏佛南無十二光佛南無七寶如來南無過現未來三世一切諸佛南無東方阿閦如來一切諸佛南無東南方無優德如來一切諸佛南無南方旃檀德如來一切諸佛南無西南方寶施如來一切諸佛南無西方無量明如來一切諸佛南無西北方華德如來一切諸佛南無北方相德如來一切諸佛南無東北方三乘行如來一切諸佛南無上方廣衆德如來一切諸佛南無下方明德如來一切諸佛南無極樂世界恆河沙數四十八大慈大悲無齊限𢿘同名阿彌陀佛南無上香劫一切諸佛諸大菩衆南無光味劫一切諸佛諸大菩衆南無無垢劫一切諸佛諸菩衆南無莊嚴劫一千諸佛諸菩衆南無星宿劫一千諸佛諸菩衆南無賢劫一千諸佛諸大菩衆南無妙智劫一切諸佛諸菩衆南無淨持劫一切諸佛諸菩衆南無妙音聲劫一切諸佛菩衆南無應往劫一切諸佛諸菩衆南無愛見劫一切諸佛諸菩衆南無寶開敷劫一切諸佛菩衆南無無住劫一切諸佛諸大菩衆南無清淨意劫一切諸佛諸菩衆南無光耀劫一切諸佛諸菩衆南無𢝫樂劫一切諸佛諸菩衆南無能度劫一切諸佛諸菩衆南無具足劫一切諸佛諸菩衆南無照明劫一切諸佛諸菩衆南無阿摩勒劫一切諸佛菩衆南無上香劫一切諸佛諸菩衆南無善覺劫一切諸佛菩衆南無寶莊嚴劫一切諸佛菩衆南無有寶劫一切諸佛諸菩衆南無喜滿劫一切諸佛諸菩衆南無大相劫一切諸佛諸菩衆南無寶明劫一切諸佛諸菩衆南無妙音滿劫一切諸佛菩衆南無離衰劫一切諸佛諸菩衆南無大光劫一切諸佛諸菩衆南無淨除劫一切諸佛諸菩衆南無陀羅𡰱劫一切諸佛菩衆南無難勝光王劫諸佛菩衆南無波羅林劫一切諸佛菩衆南無淨樂劫一切諸佛諸菩衆南無梵歎劫一切諸佛諸菩衆南無欣樂劫一切諸佛諸菩衆南無大演劫一切諸佛諸菩衆南無善見劫一切諸佛諸菩衆南無名聞劫一切諸佛諸菩衆南無善化劫一切諸佛諸菩衆南無樓油劫一切諸佛諸菩衆南無觀明劫一切諸佛諸菩衆南無威剌劫一切諸佛諸菩衆南無樂生劫一切諸佛諸菩衆南無寶成劫一切諸佛諸菩衆南無無塵劫一切諸佛諸菩衆南無禮禪劫一切諸佛諸菩衆南無𢝫觀劫一切諸佛諸菩衆南無勇猛劫一切諸佛諸菩衆南無寶明劫一切諸佛諸菩衆南無無咎劫一切諸佛諸菩衆南無勝滿劫一切諸佛諸菩衆南無正安隱劫一切諸佛菩衆南無照明劫一切諸佛諸菩衆南無首華劫一切諸佛諸菩衆南無大欣劫一切諸佛諸菩衆南無明察劫一切諸佛諸菩衆南無清淨劫一切諸佛大菩衆南無光明劫一切諸佛大菩衆南無大名稱劫一切諸佛菩衆南無淨光劫一切諸佛大菩衆南無賢天劫一切諸佛大菩衆南無電光明劫一切諸佛菩衆南無善决定劫一切諸佛菩衆南無善住劫一切諸佛大菩衆南無不可嫌劫一切諸佛大菩衆南無不可訶劫一切諸佛大菩衆南無華作劫一切諸佛大菩衆南無多盧劫一切諸佛大菩衆南無勝聲劫一切諸佛大菩衆南無成就善劫一切諸佛菩衆南無妙蓮華劫一切諸佛菩衆南無善眼劫一切諸佛大菩衆南無婆羅劫一切諸佛大菩衆南無梵讚嘆劫一切諸佛菩衆南無散華劫一切諸佛諸大菩衆南無華積劫一切諸佛諸大菩衆南無星喻劫一切