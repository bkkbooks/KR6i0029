body:
  text: 常不輕居士羅濬集南無俱蘇摩德藏菩南無金莊嚴光明菩南無光明常照手菩南無住持世間手菩南無無邊步奮迅菩南無虛空平等智菩南無波頭摩華嚴菩南無須山燈王菩南無一切法自在菩南無無垢眼山王菩南無得脫一切傳菩南無法雲王滿足菩南無無障礙受記菩南無光明威德聚菩南無發無分別行菩南無無邊功德稱菩南無無邊功德生菩南無衆生無礙嚴菩南無無量心莊嚴菩南無諸法無疑德菩南無揔持自在王菩南無金剛密迹主菩南無發心轉法輪菩南無淨衆生寶勇菩南無一切法神足王菩南無金剛拳金剛菩南無央俱施金剛菩南無光聚頂輪王菩南無摧碎頂輪王菩南無金剛種族生菩南無瑦玻訃始你菩南無忿怒軍茶利菩南無摩尼拔折唎菩南無黑羅羅金剛菩南無功德清淨藏菩南無如來族姓誦菩南無寶莊嚴堅意菩南無無盡功德藏菩南無俱素摩勝藏菩南無紅蓮華勝藏菩南無持衆生金剛菩南無華光王大智明菩南無帝隸刀利菩南無大光明網照藏菩南無那羅延德藏菩南無宿王光照藏菩南無智金剛威光菩南無觀世自在王菩南無金瓔珞明德菩南無毗闍延多羅菩南無毗栗急多羅菩南無功德寶一光菩南無功德安寶光菩南無無畏十力吼菩南無出生一切法王菩南無離一切憂暗菩南無衆智山峰王菩南無不思儀吉祥菩南無一切義吉祥菩南無破一切光王菩南無自性出生王菩南無大威神吉祥菩南無金剛喜神通菩南無阿里迦摩細菩南無虞羅摩摩細菩南無烏那野摩細菩南無金剛佉羅菩南無支嚩囉摩細菩南無破一切魔王菩南無金剛巘馱里菩南無蓮華吉祥生菩南無金剛光焰口菩南無善威儀善行菩南無無垢金光明菩南無誐誐曩巘惹菩南無清淨妙音聲菩南無尾説嚩日囉菩南無除一切罪障菩南無尾説鉢訥摩菩南無破一切幽暗菩南無具大神通王菩南無師子莊嚴王菩南無魔界行不污菩南無正等心轉法輪菩南無金剛最上明菩南無三昧自在王菩南無持日月三世菩南無降三世明王菩南無持一切福相菩南無功德王影像菩南無大吉祥天女菩南無葉衣觀自在菩南無甘露軍茶梨菩南無所受則能説菩南無魔界行不污菩南無正等心轉法輪菩南無金剛最上明菩南無三昧自在王菩南無持日月三世菩南無降三世明王菩南無持一切福相菩南無功德王影像菩南無大吉祥天女菩南無葉衣觀自在菩南無甘露軍茶梨菩南無所受則能説菩南無無性出生王菩南無𠇍熖聖覺達菩南無一切語言智菩南無陀羅尼威德菩南無金剛智威德菩南無功德最勝誦菩南無福須勝誦菩南無菩提寂靜聲菩南無發悟本聲菩南無金華光明德菩南無遍恱一切冠菩南無如來種姓勇菩南無菩提勝主王菩南無超欲無虛迹菩南無天言辝鳴音菩南無法慧光熖王菩南無第一功德名稱菩南無師子金剛勝菩南無飽滿一切音菩南無樂欲如來聲菩南無照一切道燈菩南無大雲身通王菩南無覺無底離垢菩南無師子步雷音菩南無十上月童真菩南無須藏龍仙菩南無蓮華具行劫菩南無龍威德上王菩南無蓮華孫那利菩南無慧明無畏喜菩南無樂欲世尊聲菩南無成就第一義菩南無威德覺乾𢙣菩南無照一切方燈菩南無住無垢藏王菩南無分別無著意菩南無思惟虛空意菩南無法喜慧光明菩南無思惟無礙意菩南無百目蓮華髻菩南無海月光大明菩南無普覺恱意聲菩南無普智雲日幢菩南無金熖圓滿光菩南無觀察蓮華幢菩南無普寶髻華幢菩南無善解處非處菩南無優鉢羅德藏菩南無音吉祥威力菩南無如法住山王菩南無無邊意童子菩南無百光所照明菩南無不動步超越菩南無毗俱𦙆明妃菩南無慧光無礙眼菩南無無礙勝藏王菩南無動衆生離塵菩南無普觀見無盡菩南無菩遍照相菩南無妙覺頂髻菩南無無邊觀行菩南無無量發起菩南無智功德幢菩南無第一莊嚴菩南無大勝天王菩南無不空發行菩南無無障礙發菩南無無境界行菩南無無垢奮迅菩南無一切行淨菩南無合百千德菩南無無量精進菩南無羅網光明菩南無無量光明菩南無無邊精進菩南無智稱發行菩南無無奮迅菩南無不退轉輪菩南無不空奮迅菩南無柔軟音響菩南無摩訶埵菩南無陀波崙菩南無衆德莊嚴菩南無分別辨覺菩南無功德王慧菩南無困陀羅網菩南無斷一切憂菩南無清淨三輪菩南無雲山吼聲菩南無思惟大悲菩南無志得佛聲菩南無善夜月華菩南無得如來住菩南無高貴德王菩南無青蓮華眼菩南無破邪見魔菩南無住一切聲菩南無憂波羅眼菩南無不疲倦意菩南無大須山菩南無不動華步菩南無拔陀波羅菩南無無量德寶菩南無淨住王子菩南無法雨十方菩南無三昧遊戲菩南無大智居士菩南無因陀羅德菩南無斷諸𢙣道菩南無波頭摩藏菩南無不可思議菩南無國土莊嚴菩南無樂説無滯菩南無發行成就菩南無波頭摩眼菩南無𡰱民陀羅菩南無清淨聲光菩南無羅網莊嚴菩南無不取諸法菩南無無邊雞兜菩南無諸功德身菩南無斷諸嚴王菩南無山峰住持菩南無法樂莊嚴菩南無因陀羅幢菩南無無障礙智菩南無須山聲菩南無山相莊嚴菩南無住持寂靜菩南無不可嫌稱菩南無尼拘律王菩南無甘露黠王菩南無過一切道菩南無無邊自在菩南無不虛行力菩南無離衆生相菩南無諸道不亂菩南無化無知菩南無轉法輪菩南無無差別菩南無不離佛菩南無無邊寶嚴菩南無智流布嚴菩南無功德王明菩南無無邊威德菩南無無差別嚴菩南無轉諸行嚴菩南無常發精進菩南無赤蓮華相菩南無一切法行菩南無邊辨才菩南無不斷辨才菩南無稱名離結菩南無安住律儀菩南無妙華蓋嚴菩南無大悲莊嚴菩南無觀音定嚴菩南無華生高德菩南無威德自在菩南無無異行嚴菩南無等不等觀菩南無無邊寶藏菩南無淨諸業障菩南無象香手者菩南無師子行步菩南無分別身觀菩南無無住法行菩南無觀見無常菩南無無障淨月菩南無不厭患劫菩南無得深智辨菩南無蔽塞諸障菩南無摩𡰱光王菩南無金剛勝意菩南無散諸恐怖菩南無相好積嚴菩南無摩尼金剛菩南無虛空無垢菩南無虛空勝藏菩南無觀世音母菩南無勝頂輪王菩南無一切義成菩南無寶月光明菩南無金剛連瑣菩南無金剛羂索菩南無定自在王菩南無制多雷音菩南無紅蓮華手菩南無斷諸𢙣趣菩南無遠塵勇猛菩南無有情上智菩南無香華上智菩南無高貴德光菩南無妙覺主王菩南無道場聲音菩南無出三世覺菩南無本覺音菩南無不動主王菩南無大智法幢菩南無寶藏止意菩南無金剛功德菩南無如意光積菩南無淨音聲王菩南無玄通華光菩南無福山威光菩南無離垢上智菩南無遍照上智菩南無遠塵上智菩南無金剛上智菩南無大慧威光菩南無紅蓮華藏菩南無離垢威光菩南無智照威光菩南無等勝威光菩南無無能勝冠菩南無龍王頂髻菩南無福德高幢菩南無光明高幢菩南無智慧高幢菩南無末尼高幢菩南無神通高幢菩南無覺慧高幢菩南無香無高幢菩南無普照高幢菩
