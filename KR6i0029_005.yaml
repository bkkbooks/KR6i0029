body:
  text: 常不輕叟羅濬集光明轉菩智功德菩普光明菩勝光明菩曇無竭菩寶莊嚴菩寶牟尼菩寶滿足菩星宿髮菩不空説菩大光明菩大導師菩星宿王菩那羅延菩佛華手菩不驚怖菩上莊嚴菩不發觀菩寶光明菩得勝慧菩自在觀菩思益勝菩離諸有菩名智稱菩無垢稱菩無盡意菩大勢至菩金剛藏菩無所發菩光明幢菩光明勝菩師子慧菩妙香象菩莎羅胎菩不空見菩降伏魔菩勝上身菩常精進菩堅精進菩清淨藏菩法自在菩不可盡菩求妙法菩德明王菩天音聲菩超福聚菩無礙眼菩心無礙菩虛空藏菩大香象菩解脫月菩持一切菩琉璃光菩歡喜王菩得誓𭛔菩慈仁智菩離垢淨菩不盡欲菩法印藏菩師子吼菩金剛意菩持寶炬菩大海意菩不邪見菩善中善菩淨王光菩棄𢙣法菩超山頂菩無憂德菩無比心菩山樂説菩不虛嚴菩勇猛德菩斷諸蓋菩月光明菩自在天菩那羅德菩可供養菩住佛聲菩南無淨菩最勝意菩善住意菩不捨行菩妙聲吼菩華莊嚴菩善導師菩金剛眼菩斷諸疑菩護賢劫菩增長意菩覺菩提菩心勇猛菩觀自在菩大樂説菩無緣觀菩德矅王菩超魔見菩離塵幢菩寂靜光菩虛空勝菩龍王髻菩勝成就菩成就有菩寶印手菩佛幢上菩降魔音菩大自在菩離垢光菩梵王髫菩地震音菩善威儀菩師子意菩世主音菩普見眼菩廣大覺菩無邊觀菩妙鼓聲菩功德山菩摩留天菩須山菩無障礙菩入功德菩然燈手菩金剛步菩高精進菩善思議菩娑伽羅菩常舉手菩摩尼髻菩寂靜心菩智慧猛菩步三界菩莊嚴王菩無垢智菩變化業菩光明意菩法雞兜菩無垢藏菩彌留王菩寶功德菩寶蓋山菩轉女根菩日雞兜菩寶尸棄菩須幢菩星宿味菩常悲泣菩雲光明菩大威德菩決定法菩離諸𢙣菩無邊行菩無邊幢菩世間炬菩住持華菩無障眼菩甘露聲菩無邊見菩無礙見菩法雲吼菩斷諸魔菩無邊光菩作光明菩華德藏菩無量緣菩不休息菩越三界菩大莊嚴菩無量力菩金剛力菩無量辨菩離諸難菩無邊捨菩離難菩不虛稱菩師子力菩無邊手菩不虛得菩離男相菩不虛讚菩不入胎菩常喜嚴菩善思行菩無邊辨菩無著手菩不動行菩離女相菩畢竟思菩不虛菩深行菩常悲嚴菩具戒菩袈裟相菩紹佛種菩天善友菩善知識菩無慳菩不亂菩普名聞菩不虛見菩自在力菩智自在菩梵音聲菩寶沙羅菩不虛行菩無邊眼菩無迹行菩智流布菩高華德菩無怖畏菩無邊明菩寶吉祥菩德王明菩不虛名菩不虛力菩寶行列菩住功德菩得無畏菩利益行菩善思嚴菩轉女難菩多精進菩無貪手菩甘露味菩寶樓菩無量光菩喜自在菩壞諸論菩無畏音菩無礙嚴菩無量聲菩無相嚴菩方樓菩眼名聞菩智窟德菩無邊音菩三有吉菩波羅延菩具足意菩淨生德菩金剛行菩轉諸難菩無礙音菩真妙音菩無邊姓菩樂出要菩永利世菩不忘念菩得功德菩娑訶主菩智生德菩大美德菩優鉢羅菩寶婆羅菩流布王菩樂一相菩無上智菩方流布菩智出德菩智精進菩須王菩不虛見菩旃檀德菩善威儀菩無邊菩無量意菩觀定嚴菩二牟陀菩善利意菩阿疇那菩名聞慈菩一切利菩清淨慧菩至光英菩炎熾妙菩大名聞菩不思議菩明埵髻菩惟念安菩無量音菩堅師子菩獨遊步菩捨所念菩及智積菩須彌山菩虛空王菩寶靜慧菩堅淨信菩堅固意菩離垢意菩無勝持菩寂靜慧菩治世間菩如來槊菩毗俱胝菩超三界菩大迅疾菩佛毫相菩無法行菩計始你菩金剛弓菩金剛友菩精進手菩須德菩救意慧菩金剛愛菩金剛劒菩善名稱菩功德首菩大慈生菩如來牙菩不空王菩金剛覺菩金剛輪菩金剛光菩平等住菩智慧首菩智上智菩寶上智菩日上智菩月上智菩香花幢菩持威光菩月威光菩離垢幢菩無著幢菩遍照幢菩遠塵幢菩日威光菩寶威光菩清淨眼菩離垢眼菩無著眼菩普見眼菩善利眼菩虛空眼菩名聞慈菩遍照藏菩妙覺冠菩遍照冠菩遠塵光菩梵高幢菩持吼聲菩日月光菩德慧涌菩名稱涌菩普照涌菩大慈涌菩智現涌菩高幢勝菩遍照勝菩虛空勝菩高主王菩世主王菩山主王菩梵主王菩尊主王菩寂靜音菩海潮音菩無著音菩持聲音菩智高覺菩虛空覺菩離垢覺菩無著覺菩覺悟覺菩普明覺菩維摩詰菩無量行菩善功德菩金光明菩寶意珠菩常調身菩雜花眼菩金剛子菩妙真金菩蓮花身菩滿衆菩香象王菩放光王菩光照明菩大雷音菩和檀菩韋羅摩菩天勝藏菩蓮花藏菩阿遮羅菩妙勝藏菩淨目藏菩華勝藏菩功德藏菩不邪見菩福德藏菩佛勝藏菩如來藏菩軟吉祥菩神通華菩分別明菩上寶月菩白香象菩樂説頂菩華威德菩毗婆尸菩根吉祥菩功德施菩和和檀菩大域龍菩惒樓菩師子作菩德光矅菩金剛住菩大威勇菩無上慧菩婆陀和菩重勝上菩無所有菩金剛軍菩蘇達那菩師子幡菩釋摩男菩轉女身菩金剛女菩慈世子菩須摩提菩阿述達菩摩帝麗菩大方廣菩伊波勒菩神變光菩無邊身菩宿王華菩上行意菩阿闍浮菩炎熾藏菩金剛智菩偏照幢菩日威德菩華上智菩無著智菩逮塵智菩月威德菩鼓音聲菩端嚴幢菩普明眼菩普照冠菩離塵光菩寂靜光菩大三昧菩神變光菩神通光菩殊勝涌菩法涌德菩法帝王菩象帝王菩梵帝王菩山帝王菩衆帝王菩天帝玉菩開寤覺菩斷幽菩普光覺菩觀無住菩勇猛軍菩摧過咎菩勇猛力菩淨三輪菩妙旃檀菩無邊勝菩妙離塵菩成就行菩勝智菩法光明菩法速疾菩賢吉祥菩童子光菩無諍論菩衆尊王菩度衆生菩大樓菩法王吼菩如言行菩無攀緣菩衆勝王菩深説者菩常明矅菩不離音菩無盡慧菩令信樂菩無岸智菩思無礙菩金剛色菩一切淨菩示現灰菩遠塵智菩遍説智菩無毀冠菩道場髻菩德增勇菩大慈勇菩法勇德菩慧光曜菩世光矅菩意差住菩無拯相菩須光菩消強意菩能擁護菩至誠英菩蓮華界菩衆諸安菩聖慧業菩將功勳菩淨梵施菩寶事業菩處天華菩無限法菩名聞意菩已辨積菩自在門菩十種力菩有十力菩大聖愍菩無所越菩遊寂然菩在於彼菩無數天菩極重藏菩因超越菩威神聖菩大部界菩以山護菩持三世菩有功勳菩宣名稱菩時郎王菩示現有菩光遠照菩山師子菩有取施菩莫能勝菩為最幢菩喜恱稱菩無損減菩無著天菩大明燈菩執功勳菩無等倫菩奮迅慧菩根蓮華菩功德分菩利益六菩無所𢖏菩定化王菩不捨誓菩放香光菩如香象菩非不言菩持山嵓菩石山王菩常下手菩常喜根菩法勇王菩過諸蓋菩道分味菩山積王菩金剛志菩如實見菩摧異論菩神通王菩聖者月菩金剛齊菩大樹王菩石山陰菩覺吉祥菩師子志菩善丈夫菩金剛明菩白毫相菩阿逸多菩摩摩吉菩摩里支菩聖祖拿菩金剛敷菩最勝行菩金剛速菩童子相菩含嚩里菩嚩囉呬菩金剛明菩師子行菩力士藏菩部哩𡰱菩穰虞利菩大隨求菩勝義心菩大供養菩熾盛光菩嚩枲你菩得光王菩羯磨拳菩法金剛菩無差步菩上金光菩毗婆訶菩須真𦙆菩不可説菩成就意菩吉祥生菩妙高王菩龍吉祥菩吉祥藏菩無邊視菩無兩有菩覺吉祥菩三寶尊菩摩囉大菩普緣觀菩虛空庫菩普智幢菩持藏菩光吉祥菩能念慧菩普嚴相菩普戒慧菩離塵步菩摩尼藏菩蓮華戒菩智金剛菩寂靜慧菩藥王軍菩蓮華利菩
