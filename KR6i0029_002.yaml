body:
  text: 常不輕居士羅濬集南無東方仙人山金剛勝菩三百諸菩衆南無南方勝峰山法慧菩五百諸菩衆南無西方金剛山精進行菩三百諸菩衆南無北方香積山香象菩三百諸菩衆南無東方寶柱菩九百万億諸菩衆南無南方法才菩五百萬億諸菩衆南無西方善住菩十恆河沙諸菩衆南無北方虛空性菩百千万億諸菩衆南無東方梵上菩九万九億百千那由他菩衆南無南方持成菩九万九億諸大菩衆南無西方大智菩九万九千諸大菩衆南無北方大光菩九万九千諸大菩衆南無東方九十九億百千万同名梵勝菩衆南無南方九十九億百千万同名不鄰陀羅菩南無西方九十九億百千万同名大功德菩衆南無北方九十九億百千万同名藥王菩衆南無東北方清涼山文殊菩一万諸菩衆南無海中金剛山法起菩一千二百諸菩衆南無東南方支提山天冠菩一千諸菩衆南無西南方光明山賢勝菩三千諸菩衆南無北方香風山香光菩五千諸菩衆南無清淨彼岸城目真鄰陀窟諸大菩衆南無摩蘭陀國無礙龍王建立諸大菩衆南無菴浮梨摩國見億藏諸大菩衆南無海中莊嚴窟一切諸大菩摩訶南無毗舍離南善住根諸大菩摩訶南無摩度羅城滿足窟諸菩摩訶南無甘菩遮國出生意諸大菩摩訶南無震旦國那羅延窟諸菩摩訶南無觀音菩或曰觀世音或曰觀自在南無文殊菩或曰妙吉祥或軟首童子南無彌勒菩或曰慈氏或曰阿逸多此乃梵漢不同神變有異極多類此故俱存而不敢忽也南無三世平等音聲頂髻菩南無一切如來法輪音聲頂髻菩南無等覆一切如來師子座冠菩南無普周法界虛空光影冠菩南無陀羅尼功德持一切藏菩南無無邊功德辨幢遊戲鳴音菩南無一切如來師子座冠菩南無大金山淨光明威德王藏菩南無金剛炎勝胸相莊嚴藏菩南無淨明勝照威德王藏菩南無照一切世間莊嚴藏菩南無隨順等觀一切衆生菩南無降伏一切諸根境界菩南無安慰一切衆生苦聲菩南無諸大山王牙相擊聲菩南無一切佛化光影頂髻菩南無智貟大海樂説辨才菩南無法界光影末𡰱珠冠菩南無會同一切超頂輪王菩南無分別金光明決定王菩南無年數俱致劫普生智菩南無善光無垢住持威德菩南無佛母般若波羅密多菩南無嚩日囉鉢訥摩説哩菩南無了一切句句義大辨菩南無一切佛變化影像髻菩南無一切三世名輪聲髻菩南無遍息世間苦惱音菩南無放一切如來光場珠髻菩南無一切虛空壞語寶髻菩南無出一切三世名聲髻菩南無無垢妙淨寶月手光菩南無一切衆生不請之友菩南無大雲寶旃檀香清涼菩南無大名遠震寶幢莊嚴菩南無積纍清淨金光威神王菩南無分別光明辨解散句菩南無生無量福積纍觀業菩南無光明遍照高貴德王菩南無十方精進師子娛樂神通菩南無慚愧安定發衆意行菩南無觀察勝法蓮華慧王菩南無一切普現莊嚴藏菩南無一切相莊嚴淨德藏菩南無金剛熖德相莊嚴藏菩南無破一切障勇猛智王菩南無摧一切魔軍智幢王菩南無諸法自在功德華子菩南無無量功德智莊嚴住菩南無為諸生示現細行神足菩南無如來種性成就年退菩南無威儀化衆示無瞋恚菩南無普觀諸國莊嚴變現菩南無無量辨才幢英變音菩南無法界差別智神通菩南無一切相莊嚴淨德藏菩南無金剛熖德相莊嚴藏菩南無破一切障勇猛智王菩南無摧一切魔軍智幢王菩南無諸法自在功德華子菩南無無量功德智莊嚴住菩南無為諸生示現細行神足菩南無如來種性成就無退菩南無威儀化衆示無瞋恚菩南無普觀諸國莊嚴變現菩南無無量辨才幢英變音菩南無法界差別智神通菩南無論解子義廣説神足菩南無樂説無礙神足幢名稱菩南無一切相莊嚴淨勝藏菩南無無礙熖淨光德威王菩南無見一切田莊嚴瓔珞菩南無不斷如來性出世意菩南無一切化佛光明髻菩南無得無邊辨才無畏菩南無淨寶光明威德王菩南無出生一切佛藏冠菩南無出現一切世間冠菩南無一切法界遍滿聲菩南無即發心轉法輪菩南無波頭摩勝功德菩南無普照法界虛空冠菩南無超出一切世間冠菩南無一切世間安慰音菩南無一切聲差別樂説菩南無莊嚴相星宿山王菩南無觀佛定善根莊嚴菩南無大悲理趣雲雷聲菩南無虛空庫無閡智藏菩南無金剛不動光神通菩南無天言説堅固音聲菩南無持一切清淨吉祥菩南無相莊嚴星宿聚王菩南無思惟諸法無障礙菩南無一切佛現在藏冠菩南無滅一切世苦惱音菩南無大雲金山有德王菩南無陀羅𡰱善根成住菩南無常樂集一切功德菩南無師子相無礙光曜菩南無十力清淨威光藏菩南無山王不動威光藏菩南無普音不動威光藏菩南無普清淨無盡福光菩南無雲音海光無垢藏菩南無普眼境界智莊嚴菩南無持佛金剛祕密義菩南無無礙清淨智德藏菩南無持一切衆生藏菩南無毗盧遮那光明菩南無普勝無上威德王菩南無化現法界月王菩南無諸法神通自在王菩南無淨無量網明燈王菩南無一切聲性宮殿聲菩南無如意寶三昧金剛菩南無無邊攀緣出意菩南無電莊嚴鳴音王菩南無種種樂説莊嚴藏菩南無震一切法海雷音菩南無起平等心轉法輪菩南無離一切佛法慢髻菩南無善百千開華智菩南無淨密金無疑王菩南無珠莊嚴瓔珞行菩南無師子吼鳴音王菩南無陀羅尼自在王菩南無兩時無有出生菩南無無量志莊嚴菩南無普賢衆色光菩南無摩莫雞金剛母菩南無白傘蓋頂輪王菩南無聖無邊頂輪王菩南無觀自在如意輪菩南無光明輪勝威德菩南無一切法得自在菩南無示一切大音菩南無師子奮迅吼聲菩南無清淨光明莊嚴菩南無轉無礙法輪菩南無畢竟功德成就菩南無曼殊尸利童真菩南無奮怒月點金剛菩南無降伏一切魔輪菩南無一切法海雷聲菩南無照法界理趣覺菩南無一切具足智幢菩南無神通遊戲光炎菩南無如來齊光照矅菩南無鳩摩羅浮童男菩南無三曼陀陀羅菩南無智慧普照明藏菩南無隨順平等善根菩南無優鉢羅花勝藏菩南無無礙清淨智藏菩南無無礙妙音遠藏菩南無淨一切功德藏菩南無毗盧遮那光明菩南無熒惑仙人五住菩南無慧定普照神通菩南無無思議光孩童菩南無光明遍照寶藏菩南無除一切煩惱慧菩南無破一切黑暗王菩南無一切行深智王菩南無金剛婆義神通菩南無金剛妙入神通菩南無金剛最上莊嚴菩南無發同心轉法輪菩南無從地踊持世王菩南無得一切法自在菩南無鉢蘭拏賖嚩哩菩南無具大精進步意菩南無無量志莊嚴王菩南無一切法自在王菩南無大雲滿雨心王菩南無大雲慧雨充遍菩南無大雲清淨雨王菩南無行行思議脫門菩南無出威蓮華開身菩南無寂根威儀寂行菩南無過名聲威德藏菩南無淨臂無礙光明菩南無一切善根寶聚菩南無説佛法丈夫月菩南無療一切衆生病菩南無海得寶嚴淨意菩南無最上蓮華吉祥菩南無極難敵精進大菩南無震吼深妙音聲菩南無金剛髻梨明妃菩南無摧伏一切魔怨菩南無照法界牟尼冠菩南無妙菩提牟尼冠菩南無常憂念一切人菩南無出現一切佛藏菩南無如來種性勝誦菩南無無垢寶月王光菩南無開敷功德寶花菩南無奉無數億劫行菩南無自執境界無怒菩南無壞金剛慧明照菩南無百千功德莊嚴菩南無能解甚深義郎菩南無轉法持衆寶輪菩南無淨明威德王藏菩南無相莊嚴淨德藏菩南無如來族姓成首菩南無不可思議光王菩南無虛空掌珠寶髻菩南無仙人賢力王印菩南無衆生功德香音菩南無分別一切法意菩南無一切寂定自在菩南無如意定智神通菩南無思惟最勝無邊菩南無功德寶髻智王菩南無思惟一切法意菩南無善勇猛蓮華髻菩南無大功德深美音菩南無功德自在大光菩南無陀羅尼勇健力菩南無毗盧遮那智藏菩南無威德光明王藏菩南無星宿王光照藏菩南無如來性起妙德菩南無不可壞精進王菩南無智光明幢王菩南無護持正法山王菩南無壞衆界放光明菩南無淨衆光自在王菩南無蓮華功德大梵菩南無不空奮迅界菩南無無憂勝威德菩南無無分明發行菩南無功德王光明菩南無不受戒攝受菩南無斷一切諸難菩南無變動諸法王菩南無心不捨諸慧菩南無金瓔珞明德菩南無得辨才音聲菩南無普吉祥威力菩南無勢力自在王菩南無一切佛藏冠菩南無普照三世覺菩南無功德山威力菩南無功德珊瑚上菩南無最勝自在王菩南無法界光明覺菩南無福德須上菩南無常微笑寂根菩南無波頭摩道勝菩南無破就一切義菩南無住一切悲見菩南無斷一切𢙣法菩南無能捨一切事菩
