body:
  text: 常不輕居士羅濬集南無釋迦牟尼菩南無如意光積菩南無鼻揉多羅菩南無栴檀勝藏菩南無福德勝藏菩南無勇修行智菩南無阿離念隬菩南無提婆羅大菩南無僧伽羅剎菩南無無思議光菩南無曇摩阿偈菩南無北辰妙見菩南無蓮華勝藏菩南無湏帝隸挐菩南無婆莊嚴藏菩南無婆藪槃豆菩南無商羯羅王菩南無大賔伽羅菩南無湏涅多羅菩南無阿差耶末菩南無擊金剛慧菩南無功德相嚴菩南無寶日光明菩南無功德寶光菩南無達摩達帝菩南無破樓提婆菩南無勒那多羅菩南無盤頭達多菩南無曇昧摩提菩南無南方淨土菩南無金剛吉祥菩南無福德莊嚴菩南無摩訶盧菩南無一切出生菩南無福妙高誦菩南無梵王頂髻菩南無法華光瑞菩南無婆羅提婆菩南無無迦略曳菩南無訶梨跋暮菩南無婆修跋摩菩南無俱蘇摩德菩南無無量力吼菩南無牟修輪陀菩南無栴檀吉祥菩南無福德吉祥菩南無清淨月藏菩南無光明吉祥菩南無一切寶手菩南無不退地王菩南無妙幢天幢菩南無變化夜叉菩南無妙思議藏菩南無哩你菩南無灌頂吉祥菩南無變化秘密菩南無普遍照冠菩南無金剛妙音菩南無金剛頗羅菩南無金剛寫菩南無金剛少尼菩南無金剛光明菩南無金剛藏王菩南無金剛播𡰱菩南無金剛秝羅菩南無金剛波舍菩南無金剛藥剎菩南無金剛巧業菩南無金剛足進菩南無摩𥝰嚩底菩南無如意光明菩南無得妙音聲菩南無嚩曩摩細菩南無帝祖摩細菩南無寶嚴海悲菩南無伊迦惹吒菩南無羯磨金剛菩南無大雲密藏菩南無最勝作意菩南無善寂解脫菩南無無分別光菩南無如來拳大菩南無療煩惱病菩南無善時鵝王菩南無寶藏月光菩南無降大千界菩南無鼻掬多羅菩南無三輪清淨菩南無三昧開華菩南無無邊作行菩南無極𢝫王大菩南無妙得彼岸菩南無歡𢝫高王菩南無不断大菩南無大海深王菩南無妙辨嚴王菩南無勝德赤衣菩南無難敵精進菩南無摩𡰱金剛菩南無嚴王影像菩南無大成就主菩南無善思而思菩南無梅呾麗耶菩南無蓮華勝上菩南無意不減菩南無最上寶智菩南無大神變王菩南無清淨雨王菩南無常憙恱根菩南無月靨忿怒菩南無蓮華𢝫戲菩南無山自在王菩南無功德光王菩南無一切印主菩南無離塵勇猛菩南無功德華王菩南無徤陀訶盡菩南無最上智智菩南無福山威德菩南無無垢上智菩南無勝蓮華藏菩南無照十方冠菩南無妙菩提髻菩南無大慈勝誦菩南無婆羅帝王菩南無寂靜帝王菩南無最勝帝王菩南無不動帝王菩南無善根雷聲菩南無勇猛雷音菩南無成就行菩南無毗盧遮那菩南無智照威德菩南無普勝威德菩南無善利智眼菩南無無映蔽冠菩南無普光勝誦菩南無智照勝誦菩南無善華神通菩南無成就宿緣菩南無調御眾生菩南無寶德智威菩南無金寶曜首菩南無善思義意菩南無翳日月光菩南無執離意王菩南無妙色莊嚴菩南無無垢上智菩南無恱諸方冠菩南無不動主王菩南無常持志誠菩南無根常𢝫笑菩南無建若干光菩南無大雲護子菩南無大辨聚王菩南無步不動跡菩南無神通妙華菩南無無上寶智菩南無道場珠冠菩南無婆羅王德菩南無消諸憂冥菩南無德寶較飾菩南無遊步到明菩南無言行相應菩南無白智僮真菩南無地最上王菩南無一切吉利菩南無無滅進意菩南無照四千里菩南無潤疾顯明菩南無明見光賢菩南無大海深王菩南無大水伽羅菩南無𢝫以眼見菩南無止一切盖菩南無特嚴欲好菩南無變眾法王菩南無樂欲佛聲菩南無視處悉吉菩南無福光平等菩南無普利可見菩南無隨智勇行菩南無度不動跡菩南無空寂顯明菩南無恱持無怒菩南無大雲星光菩南無得上授記菩南無人中之天菩南無緊那羅王菩南無柔音軟響菩南無大雲福田菩南無妙心開意菩南無深密解脫菩南無大雲現道菩南無思於大哀菩南無金網莊嚴菩南無羅鄰師利菩南無涅羅師利菩南無惟闍師利菩南無曇摩師利菩南無陀師利菩南無檀那師利菩南無月光莊嚴菩南無大雲華菩南無大雲順師菩南無顯音契王菩南無諸法變王菩南無雲雷振聲菩南無佛陀師利菩南無𢜪那師利菩南無群那師利菩南無思無量義菩南無持佛英輪菩南無持過地力菩南無蓮華吉藏菩南無功德山王菩南無持佛金剛菩南無魔界香音菩南無無量示現菩南無造智知識菩南無羅鄰那竭菩南無栴檀德藏菩南無光明熖藏菩南無不染行處菩南無善意覺觀菩南無不可近意菩南無樹王印勝菩南無菩提炎相菩南無無等煩惱菩南無無邊發王菩南無求善法王菩南無蘇利耶藏菩南無四無礙智菩南無分別辨覺菩南無光密功德菩南無畢竟淨意菩南無無障礙燈菩南無蓮華德藏菩照明藏菩蠲慢意菩懷愛樂菩慈不聲菩常不輕菩妙吉祥菩德山勇菩常精進菩普照勇菩名稱勇菩智照勇菩三界尊菩天主王菩化主王菩三品淨菩遍恱德菩虛空德菩法主王菩寂主王菩智炬燈菩眾主王菩善心念菩在所吉菩和呵末菩寶念菩大氣力菩解脫王菩持甘露菩佛功德菩住無量菩入無諍菩無垢熖菩德吉勝菩不動搖菩不着行菩不迷見菩捨女飾菩立報荅菩好疑問菩摩尼那菩無迷行菩永断疑菩善變化菩不虛現菩樂𢝫生菩持祠身菩阿泥察菩無盡華菩端嚴藏菩華戲慧菩察無岸菩德嚴華菩悲旋潤菩最高辨菩善上乘菩滅眾病菩燈明王菩伽睺多菩種姓生菩波頭摩菩月盛滿菩不違信菩合曼掌菩智山幢菩道勝子菩明炎成菩栴擅那菩上名意菩長壽王菩延壽王菩等樂趣菩師子香菩賢顯明菩不休息菩妙香口菩妙香說菩智山光菩光聲陽菩不可生菩普照明菩金城山菩大處廢菩雨山鼎菩安處度菩離欲迹菩心信恱菩芙蓉吉菩增長志菩𢝫神靈菩妙色光菩無量志菩蓮華目菩揔敖王菩增去志菩普照月菩放光月菩妙名月菩大進趣菩地輪音菩正定意菩大進徤菩大雲性菩首藏華菩𢝫信淨菩出眾寶菩揔豪王菩無邊行菩珠頂王菩不等觀菩寶甚持菩神通華菩大辨藏菩等不等菩無盡智菩現寶盖菩持一切菩安立行菩石磨王菩諸神通菩普稱尊菩出力勢菩無退進菩慧剛意菩雨覺雨菩珠相炎菩慧茂藏菩上埸王菩無愚現菩如佛威菩靜正幢菩智燈光菩那羅達菩和輪調菩慚愧林菩無量明菩無邊禪菩大威光菩湏和菩湏深菩跋陀和菩
